{% load static %}

<div class="project-card">
    <div class="project-card-header">
        <h3 class="project-card-title">
            <a href="{% url 'projects:detail' project.id %}" class="project-detail-link">{{ project.name }}</a>
        </h3>
        
        {% if user.is_authenticated %}
        <button
                class="project-fav-icon {% if project in user.favorites.all %}favorite{% else %}not-favorite{% endif %}"
                data-project-id="{{ project.id }}"
                data-url="{% url 'projects:toggle-favorite' project.id %}"
                title="Добавить в избранное"
        >
            {% include 'includes/svg/heart.html' %}
        </button>
        {% endif %}
    </div>

    <p class="project-card-desc">{{ project.description|truncatewords:20 }}</p>

    <div class="project-card-footer">
        <div class="project-author">
            <span>Автор: {{ project.owner.username }}</span>
        </div>

        {% if user.is_authenticated and project.owner_id != user.id %}
            <button 
                class="project-join-btn {% if user in project.participants.all %}joined{% endif %}"
                data-url="{% url 'projects:toggle-participate' project.id %}"
            >
                {% if user in project.participants.all %}
                    Вы участвуете
                {% else %}
                    Стать участником
                {% endif %}
            </button>
        {% elif project.owner_id == user.id %}
            <span class="badge owner-badge">Ваш проект</span>
        {% endif %}
    </div>
</div>
